<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>AI翻译助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI翻译助手</h1>
            <p class="subtitle">中文翻译成英文，并提取关键词</p>
        </header>

        <main>
            <div class="input-section">
                <label for="input-text">输入中文内容</label>
                <textarea
                    id="input-text"
                    placeholder="请输入要翻译的中文内容..."
                    rows="6"
                ></textarea>
                <button id="translate-btn" class="translate-button">翻译</button>
            </div>

            <div class="output-section">
                <div class="result-container">
                    <h2>翻译结果</h2>
                    <div id="translation-result">
                        <p class="placeholder">翻译结果将显示在这里...</p>
                    </div>
                </div>

                <div class="audio-container hidden">
                    <h2>语音播放</h2>
                    <audio id="audio-player" controls autoplay></audio>
                </div>

                <div class="keywords-container">
                    <h2>关键词</h2>
                    <div id="keywords-result">
                        <span class="keyword-tag">示例1</span>
                        <span class="keyword-tag">示例2</span>
                        <span class="keyword-tag">示例3</span>
                    </div>
                </div>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>正在翻译中，请稍候...</p>
            </div>

            <div id="error-message" class="error-message hidden"></div>
        </main>

        <footer>
            <p>AI翻译助手 - 技术测试项目</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
